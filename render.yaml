services:
  # Frontend Web Service
  - type: web
    name: pc-solutions-frontend
    env: node
    plan: starter
    branch: merge/pcs-development-integration
    buildCommand: pnpm run prebuild:render && cd frontend && pnpm install --frozen-lockfile=false && pnpm run build:render
    startCommand: cd frontend && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_API_URL
        value: https://pc-solutions-v2.onrender.com/api
      - key: VITE_SKIP_AUTH
        value: false
      - key: VITE_DEVELOPMENT_MODE
        value: false
      # Sentry Error Tracking (Optional - set in Render dashboard)
      - key: VITE_SENTRY_DSN
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_SENTRY_RELEASE
        value: frontend@1.0.0
      - key: SENTRY_ORG
        sync: false  # Optional - for source map upload
      - key: SENTRY_PROJECT
        value: frontend
      - key: SENTRY_AUTH_TOKEN
        sync: false  # Optional - for source map upload

  # API Backend Service
  - type: web
    name: pc-solutions-v2
    env: node
    plan: starter
    buildCommand: pnpm run prebuild:render && cd api && pnpm install --frozen-lockfile && pnpm run build:render
    startCommand: cd api && pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLERK_SECRET_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: CLERK_WEBHOOK_SECRET
        sync: false  # Must be set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: pc-solutions-db
          property: connectionString
      # Required for Clerk JWT token validation (azp claim)
      - key: ADMIN_ORIGIN
        value: https://admin.procrechesolutions.com
      - key: APP_ORIGIN
        value: https://app.procrechesolutions.com
        # Note: Update APP_ORIGIN if your frontend uses a different domain (e.g., dash.procrechesolutions.com)
      # Sentry Error Tracking (Optional - set in Render dashboard)
      - key: SENTRY_DSN
        sync: false  # Must be set manually in Render dashboard
      - key: SENTRY_RELEASE
        value: api@1.0.0
      - key: SENTRY_ORG
        sync: false  # Optional - for source map upload
      - key: SENTRY_PROJECT
        value: api
      - key: SENTRY_AUTH_TOKEN
        sync: false  # Optional - for source map upload

  # Admin Panel Service
  - type: web
    name: pc-solutions-admin
    env: node
    plan: starter
    branch: merge/pcs-development-integration
    buildCommand: pnpm run prebuild:render && cd admin && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: cd admin && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_API_URL
        value: https://pc-solutions-v2.onrender.com/api
        # Note: Must include /api suffix as admin code uses this directly as baseURL
        # Note: Using pc-solutions-v2 as that appears to be the actual service name in Render
      - key: VITE_SKIP_AUTH
        value: false
      # Sentry Error Tracking (Optional - set in Render dashboard)
      - key: VITE_SENTRY_DSN
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_SENTRY_RELEASE
        value: admin@1.0.0
      - key: SENTRY_ORG
        sync: false  # Optional - for source map upload
      - key: SENTRY_PROJECT
        value: admin
      - key: SENTRY_AUTH_TOKEN
        sync: false  # Optional - for source map upload

databases:
  # PostgreSQL Database
  - name: pc-solutions-db
    plan: starter
    databaseName: pc_solutions_prod
    user: pc_solutions_user