services:
  # API Service - Development
  - type: web
    name: pc-solutions-api-dev
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build --filter=api
    startCommand: cd build/apps/api && pnpm start:dev
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pc-solutions-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: PROMETHEUS_SCRAPE_TOKEN
        sync: false

  # Frontend Service (Primary) - Development
  - type: web
    name: pc-solutions-frontend-dev
    env: node
    plan: starter
    buildCommand: echo "=== CLERK KEY DEBUG ===" && echo "VITE_CLERK_PUBLISHABLE_KEY length:" $(echo -n "$VITE_CLERK_PUBLISHABLE_KEY" | wc -c) && echo "Key starts with:" $(echo "$VITE_CLERK_PUBLISHABLE_KEY" | cut -c1-10) && echo "Key format check:" $(echo "$VITE_CLERK_PUBLISHABLE_KEY" | grep -o '^pk_[a-z]*_[a-zA-Z0-9]*' || echo 'INVALID FORMAT') && echo "=== END DEBUG ===" && pnpm install --frozen-lockfile && pnpm run build --filter=frontend
    startCommand: cd frontend && npx serve -s dist
    envVars:
      - key: VITE_NODE_ENV
        value: development
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        value: https://pc-solutions-api-dev.onrender.com/api
      - key: VITE_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: VITE_CLERK_SIGN_UP_URL
        value: /sign-up
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Admin Service (Satellite) - Development
  - type: web
    name: pc-solutions-admin-dev
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build --filter=admin
    startCommand: cd admin && npx serve -s dist
    envVars:
      - key: VITE_NODE_ENV
        value: development
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        value: https://pc-solutions-api-dev.onrender.com/api
      - key: VITE_CLERK_IS_SATELLITE
        value: "true"
      - key: VITE_CLERK_DOMAIN
        value: admin.procrechesolutions.com
      - key: VITE_CLERK_SIGN_IN_URL
        value: https://app.procrechesolutions.com/sign-in
      - key: VITE_CLERK_SIGN_UP_URL
        value: https://app.procrechesolutions.com/sign-up
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pc-solutions-db
    plan: starter