services:
  # Frontend Web Service
  - type: web
    name: pc-solutions-frontend
    env: node
    plan: starter
    branch: merge/pcs-development-integration
    buildCommand: pnpm run prebuild:render && cd frontend && pnpm install --frozen-lockfile=false && pnpm run build:render
    startCommand: cd frontend && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_API_URL
        value: https://pc-solutions-api.onrender.com
      - key: VITE_SKIP_AUTH
        value: false
      - key: VITE_DEVELOPMENT_MODE
        value: false

  # API Backend Service
  - type: web
    name: pc-solutions-api
    env: node
    plan: starter
    buildCommand: pnpm run prebuild:render && cd api && pnpm install --frozen-lockfile && pnpm run build:render
    startCommand: cd api && pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLERK_SECRET_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: CLERK_WEBHOOK_SECRET
        sync: false  # Must be set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: pc-solutions-db
          property: connectionString

  # Admin Panel Service
  - type: web
    name: pc-solutions-admin
    env: node
    plan: starter
    branch: merge/pcs-development-integration
    buildCommand: pnpm run prebuild:render && cd admin && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: cd admin && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: VITE_API_URL
        value: https://pc-solutions-api.onrender.com
      - key: VITE_SKIP_AUTH
        value: false

databases:
  # PostgreSQL Database
  - name: pc-solutions-db
    plan: starter
    databaseName: pc_solutions_prod
    user: pc_solutions_user