server {
    # Render Docker web services expect the container to listen on 10000
    listen 10000 default_server;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- SPA fallback: this is the key bit ---
    location / {
        # Try the exact file, then a folder index, else serve index.html
        try_files $uri $uri/ /index.html;
    }

    # Static assets: cache aggressively
    # NOTE: nginx drops all server-level add_header directives when a location
    # block defines its own, so security headers must be repeated here.
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers (defined once; repeated in location blocks that use add_header
    # because nginx drops server-level add_header directives when a location block
    # has its own add_header).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.clerk.accounts.dev https://api.procrechesolutions.com wss://*.procrechesolutions.com https://*.sentry.io https://*.hcaptcha.com https://hcaptcha.com; frame-src https://*.clerk.accounts.dev https://challenges.cloudflare.com https://*.hcaptcha.com https://hcaptcha.com; frame-ancestors 'self';" always;
}