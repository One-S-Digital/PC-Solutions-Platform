version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pc_solutions_dev
      POSTGRES_USER: pc_solutions_user
      POSTGRES_PASSWORD: pc_solutions_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pc_solutions_user -d pc_solutions_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    build:
      context: ./docker
      dockerfile: Dockerfile.clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - CLAMAV_NO_FRESHCLAM=false
      - CLAMAV_NO_CLAMD=false

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI & HTTP API
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-devpassword}"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://pc_solutions_user:pc_solutions_password@postgres:5432/pc_solutions_dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=devpassword
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - UPLOAD_MODE=local
      - UPLOAD_MAX_MB=20
      - UPLOAD_ALLOWED_EXT=pdf,png,jpg,jpeg,webp,doc,docx
      - UPLOAD_ALLOWED_MIME=application/pdf,image/png,image/jpeg,image/webp,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - MAIL_PROVIDER=SMTP
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_SECURE=false
      - SMTP_FROM="PC Solutions <no-reply@notify.pc-solutions.ch>"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./api/uploads:/app/uploads
      - ./api:/app
      - /app/node_modules
    command: ["pnpm", "run", "start:dev"]

volumes:
  postgres_data:
  clamav_data:
  redis_data: