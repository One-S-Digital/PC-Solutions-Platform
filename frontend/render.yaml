# Render deployment configuration for Pro Crèche Solutions Frontend
services:
  # Frontend Static Site
  - type: web
    name: procreche-frontend
    env: static
    buildCommand: npm install && npm run build:production
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_APP_ENV
        value: production
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_NAME
        value: "Pro Crèche Solutions"
      - key: VITE_APP_VERSION
        value: "1.0.0"
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: /*.html
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    healthCheckPath: /health

  # Optional: Backend API service (if deploying backend to Render)
  - type: web
    name: procreche-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    plan: starter
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
    healthCheckPath: /api/health

databases:
  # Optional: PostgreSQL database (if using Render's managed database)
  - name: procreche-db
    plan: starter
    databaseName: procreche
    user: procreche_user