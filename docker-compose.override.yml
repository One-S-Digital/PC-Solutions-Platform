version: '3.8'

services:
  # Override Frontend service for development
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: cd frontend && pnpm run dev
    volumes:
      - ./frontend:/app/frontend
      - ./packages:/app/packages
      - /app/node_modules
    ports:
      - "5173:5173"

  # Override Admin service for development
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    command: cd admin && pnpm run dev
    volumes:
      - ./admin:/app/admin
      - ./packages:/app/packages
      - /app/node_modules
    ports:
      - "5174:5174"